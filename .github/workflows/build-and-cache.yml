name: Build and Cache

on:
  push:
    branches:
      - master
    paths:
      - 'pkgs/**'
      - 'flake.nix'
      - 'flake.lock'
  pull_request:
    paths:
      - 'pkgs/**'
      - 'flake.nix'
      - 'flake.lock'
  workflow_dispatch:

jobs:
  build-and-cache:
    name: Build and cache Brave browsers
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser:
          - brave-nightly
          - brave-beta
          - brave-origin-nightly
          - brave-stable
          - brave-origin-beta
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build ${{ matrix.browser }}
        run: |
          echo "🏗️ Building ${{ matrix.browser }} for cache..."
          nix build .#${{ matrix.browser }} --print-build-logs --accept-flake-config
