name: Update Brave Nightly

on:
  schedule:
    - cron: '0 4 * * *' # Run daily at 4:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run update script
        run: |
          chmod +x update.sh
          ./update.sh

      - name: Verify build
        run: |
          nix build .#brave-nightly --accept-flake-config
          nix build .#brave-beta --accept-flake-config
          nix build .#brave-origin-nightly --accept-flake-config
          nix build .#brave-stable --accept-flake-config
          nix build .#brave-origin-beta --accept-flake-config

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore: update brave versions"
          file_pattern: pkgs/*.nix
          branch: master
